name: OOB Testing Pipeline
on: workflow_dispatch

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with: {python-version: '3.10'}
      - name: Install dependencies
        run: |
          pip install imageio pytest pytest-cov
      - name: Run Functional & Performance Tests
        run: |
          pytest tests/ --cov=imageio --cov-report=xml
      - name: Generate MD Report
        run: python scripts/report_generator.py